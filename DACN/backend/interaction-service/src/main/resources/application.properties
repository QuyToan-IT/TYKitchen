# === Tên Service & Database ===
spring.application.name=INTERACTION-SERVICE
spring.datasource.url=jdbc:mysql://localhost:3306/interactions_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=rootpass

# === Cấu hình JPA ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# === Port chạy Service ===
server.port=8083

# === Kết nối Eureka (Tổng đài) ===
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# === Logging ===
logging.level.root=INFO
logging.level.com.toan_yen.interaction_service=DEBUG

