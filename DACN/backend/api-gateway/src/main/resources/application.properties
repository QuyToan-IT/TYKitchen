spring.cloud.gateway.server.webflux.routes[5].id=article-service-tags
spring.cloud.gateway.server.webflux.routes[5].uri=lb://ARTICLE-SERVICE
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/api/v1/tags/**

# F.3 - Article Service (Article images)
