# ================================
# 1. CẤU HÌNH CHUNG
# ================================
spring.application.name=API-GATEWAY
server.port=8888

# ================================
# 2. EUREKA CLIENT
# ================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ================================
# 3. JWT SECRET KEY (custom property)
# ================================
jwt.secret-key=DangQuyToan23102004LuuThiKimYen19032004

# ================================
# 4. GATEWAY ROUTES & DISCOVERY
# ================================
spring.cloud.gateway.server.webflux.discovery.locator.enabled=false
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

# --- A. User-Service Public (auth) ---
spring.cloud.gateway.server.webflux.routes[0].id=user-service-public
spring.cloud.gateway.server.webflux.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/auth/**

# --- B. User-Service Protected ---
spring.cloud.gateway.server.webflux.routes[1].id=user-service-protected
spring.cloud.gateway.server.webflux.routes[1].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/v1/users/**
 
# --- C. Recipe-Service ---
# Tách thành 2 route riêng để tránh AND giữa nhiều Path trong cùng route
spring.cloud.gateway.server.webflux.routes[2].id=recipe-service-recipes
spring.cloud.gateway.server.webflux.routes[2].uri=lb://RECIPE-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/v1/recipes/**

spring.cloud.gateway.server.webflux.routes[3].id=recipe-service-categories
spring.cloud.gateway.server.webflux.routes[3].uri=lb://RECIPE-SERVICE
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/v1/categories/**

# --- D. Article-Service ---
 # Tách thành 2 route riêng: articles và tags
spring.cloud.gateway.server.webflux.routes[4].id=article-service-articles
spring.cloud.gateway.server.webflux.routes[4].uri=lb://ARTICLE-SERVICE
