# === Database MỚI ===
spring.application.name=ARTICLE-SERVICE
# Database này sẽ tự động được tạo nếu chưa có
spring.datasource.url=jdbc:mysql://localhost:3306/articles_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=rootpass

# Cấu hình JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# === Port MỚI ===
# Chạy service này trên port 8082
server.port=8082
# === THÊM CỤC NÀY (Để gọi "Tổng đài") ===
eureka.client.service-url.defaultZone=http://discovery-service:8761/eureka/
eureka.instance.prefer-ip-address=true
#eureka.client.enabled=false
# Đường dẫn thư mục chứa ảnh bài viết
article.upload-dir=/upload/article

# Cho Spring Boot phục vụ file tĩnh từ thư mục này
spring.web.resources.static-locations=file:/upload/article/

# Pattern URL để truy cập
spring.mvc.static-path-pattern=/uploads/article/**
